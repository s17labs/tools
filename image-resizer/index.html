<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer | s17 Labs Tools</title>
    
    <meta name="description" content="A fast, free, and secure batch image resizer by s17 Labs. Resize single or multiple images locally in your browser with aspect ratio locking and high-quality output.">
    
    <link rel="icon" type="image/x-icon" href="https://s17labs.github.io/src/assets/favicon.ico">
    
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --bg-color: #0e0e10;
            --accent: #ff4136;
            --accent-muted: rgba(255, 65, 54, 0.1);
            --text-primary: #f1f1f1;
            --text-secondary: #868686;
            --card-bg: #18181b;
            --input-bg: #27272a;
            --border: #3f3f46;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            padding: 20px;
        }

        h1 { 
            font-family: 'Aldrich', sans-serif; 
            margin: 0 0 1.5rem 0; 
            font-size: 1.75rem; 
            text-align: center; 
            letter-spacing: 1px;
            color: var(--text-primary);
        }
        
        h1 a { text-decoration: none; color: inherit; }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        #drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s ease;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        #drop-zone:hover { border-color: var(--accent); background: var(--accent-muted); }

        .upload-icon {
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 5px;
        }

        #drop-text { font-weight: 500; color: var(--text-primary); }
        .sub-text { font-size: 0.85rem; color: var(--text-secondary); }

        #preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 240px;
            margin-top: 15px;
        }

        .thumb-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .thumb { width: 100%; height: 100%; object-fit: cover; }

        .more-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-row { display: flex; gap: 12px; }
        .input-group { flex: 1; min-width: 0; }
        label { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); display: block; margin-bottom: 6px; }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            color: var(--text-primary);
            outline: none;
        }

        input[type="number"]:focus { border-color: var(--accent); }

        .aspect-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            color: var(--text-primary);
            cursor: pointer;
        }

        .aspect-row input[type="checkbox"] {
            accent-color: var(--accent);
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        #download-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #download-btn:active { transform: scale(0.98); }
        #download-btn:disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        .info-box {
            text-align: center;
            padding: 24px;
            background: var(--accent-muted);
            border-radius: 12px;
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 65, 54, 0.2);
        }

        .info-box h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: var(--accent);
        }

        .info-box p { font-size: 0.9rem; margin-bottom: 16px; color: var(--text-primary); line-height: 1.4; }

        .btn-secondary {
            display: inline-block;
            padding: 10px 20px;
            background: transparent;
            color: var(--accent);
            opacity: 0.6;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            border: 2px solid var(--accent);
            transition: all 0.2s ease;
        }

        .btn-secondary:hover { opacity: 1; background: rgba(255, 65, 54, 0.05); }
        .btn-secondary:active { background: var(--accent); color: #fff; }

        footer {
            margin-top: auto;
            text-align: center;
            padding: 40px 0 20px 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .stealth-link { color: inherit; text-decoration: none; font-weight: 600; }
        .stealth-link:hover { color: var(--accent); text-decoration: underline; }

        footer a.source-link { 
            color: var(--accent);
            text-decoration: none; 
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 10px;
        }
        footer a.source-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1><a href="../">Image Resizer</a></h1>
    
    <div id="drop-zone">
        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
        <div id="drop-text">Drag & drop images or click to upload</div>
        <div class="sub-text">(Batch resizing supported)</div>
        <div id="preview-grid"></div>
        <input type="file" id="file-input" accept="image/*" multiple hidden>
    </div>

    <div class="controls">
        <div class="input-row">
            <div class="input-group">
                <label>Width (px)</label>
                <input type="number" id="width-input" placeholder="0">
            </div>
            <div class="input-group">
                <label>Height (px)</label>
                <input type="number" id="height-input" placeholder="0">
            </div>
        </div>
        
        <label class="aspect-row">
            <input type="checkbox" id="aspect-lock" checked>
            <span>Lock Aspect Ratio</span>
        </label>
    </div>

    <button id="download-btn" disabled>
        <i class="fa-solid fa-download"></i>
        <span id="btn-text">Download Image</span>
    </button>
</div>

<div class="info-box">
    <h3>More s17 Labs Tools</h3>
    <p>Discover more free and powerful utility tools designed for creators and developers.</p>
    <a href="../" class="btn-secondary">View More Tools</a>
</div>

<footer>
    <p>&copy; <span id="year"></span> <a href="https://s17labs.github.io" class="stealth-link">s17 Labs</a></p>
    <a href="https://github.com/s17labs/tools" class="source-link"><i class="fa-brands fa-github"></i> Source Code</a>
</footer>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const widthInput = document.getElementById('width-input');
    const heightInput = document.getElementById('height-input');
    const aspectLock = document.getElementById('aspect-lock');
    const downloadBtn = document.getElementById('download-btn');
    const btnText = document.getElementById('btn-text');
    const previewGrid = document.getElementById('preview-grid');
    
    document.getElementById('year').textContent = new Date().getFullYear();

    let imageFiles = [];
    let baseRatio = 1;

    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('hover');
    dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('hover'); handleFiles(e.dataTransfer.files); };
    fileInput.onchange = (e) => handleFiles(e.target.files);

    function updatePreviewGallery(allFiles) {
        previewGrid.innerHTML = '';
        const limit = 6;
        const total = allFiles.length;
        
        allFiles.slice(0, limit).forEach((fileData, index) => {
            const container = document.createElement('div');
            container.className = 'thumb-container';
            const img = document.createElement('img');
            img.src = fileData.preview;
            img.className = 'thumb';
            container.appendChild(img);

            if (total > limit && index === limit - 1) {
                const overlay = document.createElement('div');
                overlay.className = 'more-overlay';
                overlay.innerText = `+${total - (limit - 1)}`;
                container.appendChild(overlay);
            }
            previewGrid.appendChild(container);
        });
    }

    function handleFiles(files) {
        if (!files.length) return;
        imageFiles = [];
        const fileArray = Array.from(files);
        btnText.innerText = fileArray.length > 1 ? "Download Images" : "Download Image";

        let loadedCount = 0;
        fileArray.forEach((file) => {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    if (imageFiles.length === 0) {
                        widthInput.value = img.width;
                        heightInput.value = img.height;
                        baseRatio = img.width / img.height;
                    }
                    const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                    imageFiles.push({ img, name: originalName, preview: e.target.result });
                    loadedCount++;
                    if (loadedCount === fileArray.length) updatePreviewGallery(imageFiles);
                    downloadBtn.disabled = false;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    widthInput.oninput = () => { if (aspectLock.checked) heightInput.value = Math.round(widthInput.value / baseRatio); };
    heightInput.oninput = () => { if (aspectLock.checked) widthInput.value = Math.round(heightInput.value * baseRatio); };

    downloadBtn.onclick = async () => {
        const targetW = parseInt(widthInput.value);
        const targetH = parseInt(heightInput.value);
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = targetW;
        canvas.height = targetH;

        if (imageFiles.length === 1) {
            ctx.drawImage(imageFiles[0].img, 0, 0, targetW, targetH);
            const link = document.createElement('a');
            link.download = `${imageFiles[0].name}-resized.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.85);
            link.click();
        } else {
            const originalBtnContent = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            
            const zip = new JSZip();
            for (const item of imageFiles) {
                ctx.clearRect(0, 0, targetW, targetH);
                ctx.drawImage(item.img, 0, 0, targetW, targetH);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                zip.file(`${item.name}-resized.jpg`, dataUrl.split(',')[1], {base64: true});
            }
            const content = await zip.generateAsync({type: "blob"});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = `${imageFiles.length}-batch-resized-images.zip`;
            link.click();
            downloadBtn.innerHTML = originalBtnContent;
        }
    };
</script>

</body>
</html>
